<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      const path = window.location.pathname;
      const base = '/habit-tracker-lite';
      const route = path.replace(base, '') || '/';
      sessionStorage.setItem('redirect', route);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
